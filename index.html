<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabLab — Word Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #c8f060;
    --accent2: #60d4f0;
    --accent3: #f060b0;
    --text: #e8e8f0;
    --text-muted: #7a7a90;
    --text-dim: #4a4a60;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    width: 100%;
    max-width: 820px;
    padding: 32px 24px 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .tagline {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  main {
    width: 100%;
    max-width: 820px;
    padding: 28px 24px 60px;
    position: relative;
    z-index: 1;
  }

  /* Input section */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .word-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .word-input::placeholder { color: var(--text-dim); font-weight: 400; font-size: 15px; }
  .word-input:focus { border-color: var(--accent); }

  .analyze-btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    padding: 12px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .analyze-btn:hover { opacity: 0.88; }
  .analyze-btn:active { transform: scale(0.97); }
  .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loader */
  .loader {
    display: none;
    text-align: center;
    padding: 48px 0;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  .loader.visible { display: block; }

  .loader-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin: 0 3px;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  /* Result card */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeSlide 0.35s ease;
  }

  .result-card.visible { display: block; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Word header */
  .word-header {
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .word-main { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }

  .word-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .word-pos {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    background: rgba(96, 212, 240, 0.1);
    border: 1px solid rgba(96, 212, 240, 0.2);
    padding: 3px 8px;
    border-radius: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .word-phonetic {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Badges */
  .badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
    letter-spacing: 0.3px;
  }

  .badge-freq-high { color: #60f09a; border-color: rgba(96,240,154,0.3); background: rgba(96,240,154,0.08); }
  .badge-freq-mid  { color: #f0c860; border-color: rgba(240,200,96,0.3); background: rgba(240,200,96,0.08); }
  .badge-freq-low  { color: #f08060; border-color: rgba(240,128,96,0.3); background: rgba(240,128,96,0.08); }
  .badge-level     { color: var(--accent2); border-color: rgba(96,212,240,0.25); background: rgba(96,212,240,0.06); }
  .badge-diff      { color: var(--text-muted); border-color: var(--border); background: transparent; }

  /* Sections */
  .sections { display: flex; flex-direction: column; }

  .section {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }

  .section:last-child { border-bottom: none; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .definition {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }

  .definition-uk {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    font-style: italic;
  }

  /* Usage meter */
  .usage-meter {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .meter-bar {
    flex: 1;
    min-width: 140px;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .meter-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.6s ease;
  }

  .meter-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* Topics */
  .topics { display: flex; gap: 8px; flex-wrap: wrap; }

  .topic-tag {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  /* Examples */
  .examples { display: flex; flex-direction: column; gap: 10px; }

  .example-item {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
  }

  .example-en {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
  }

  .example-context {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    font-style: italic;
  }

  /* Synonyms grid */
  .synonyms-grid { display: flex; flex-direction: column; gap: 10px; }

  .syn-group { }

  .syn-group-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .syn-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  .syn-tag {
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .syn-simpler {
    color: #60f09a;
    border-color: rgba(96,240,154,0.25);
    background: rgba(96,240,154,0.05);
  }
  .syn-simpler:hover { background: rgba(96,240,154,0.12); }

  .syn-similar {
    color: var(--accent2);
    border-color: rgba(96,212,240,0.25);
    background: rgba(96,212,240,0.05);
  }
  .syn-similar:hover { background: rgba(96,212,240,0.12); }

  .syn-harder {
    color: var(--accent3);
    border-color: rgba(240,96,176,0.25);
    background: rgba(240,96,176,0.05);
  }
  .syn-harder:hover { background: rgba(240,96,176,0.12); }

  /* Practice section */
  .practice-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 20px;
    display: none;
    animation: fadeSlide 0.3s ease;
  }

  .practice-section.visible { display: block; }

  .practice-header {
    padding: 16px 22px;
    background: rgba(200, 240, 96, 0.04);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .practice-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.3px;
  }

  .practice-counter {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .practice-body { padding: 18px 22px; }

  .situation-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 14px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-muted);
    border-left: 3px solid var(--accent2);
  }

  .situation-box strong { color: var(--text); }

  .prompt-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 14px;
    font-weight: 400;
  }

  .hint-text {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
    font-style: italic;
  }

  .answer-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    resize: vertical;
    min-height: 70px;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  .answer-input:focus { border-color: var(--accent2); }
  .answer-input::placeholder { color: var(--text-dim); }

  .practice-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .check-btn {
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .check-btn:hover { opacity: 0.85; }

  .next-btn {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .next-btn:hover { border-color: var(--text-muted); color: var(--text); }

  /* Feedback */
  .feedback-box {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeSlide 0.25s ease;
  }

  .feedback-box.visible { display: block; }
  .feedback-box.good { background: rgba(96,240,154,0.08); border: 1px solid rgba(96,240,154,0.2); color: #a0f0b8; }
  .feedback-box.improve { background: rgba(200,240,96,0.07); border: 1px solid rgba(200,240,96,0.2); color: #d8f080; }

  .feedback-box .fb-label {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  /* Error */
  .error-box {
    padding: 16px 20px;
    background: rgba(240,96,96,0.08);
    border: 1px solid rgba(240,96,96,0.2);
    border-radius: 8px;
    color: #f08080;
    font-size: 14px;
    display: none;
    margin-top: 16px;
  }
  .error-box.visible { display: block; }

  /* Word history chips */
  .history-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .history-chip {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .history-chip:hover { border-color: var(--accent); color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">VocabLab <span>/ word intelligence</span></div>
  <div class="tagline">B1→B2 activation trainer</div>
</header>

<main>

  <div class="input-section">
    <div class="input-row">
      <input
        class="word-input"
        id="wordInput"
        type="text"
        placeholder="Enter any English word..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="analyze-btn" id="analyzeBtn" onclick="analyzeWord()">Analyze →</button>
    </div>
  </div>

  <div class="history-row" id="historyRow"></div>

  <div class="loader" id="loader">
    <div class="loader-dots"><span></span><span></span><span></span></div>
    <div style="margin-top:12px">Analyzing word intelligence...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">

    <div class="word-header">
      <div>
        <div class="word-main">
          <div class="word-title" id="rWord"></div>
          <div class="word-pos" id="rPos"></div>
        </div>
        <div class="word-phonetic" id="rPhonetic" style="margin-top:6px"></div>
      </div>
      <div class="badges" id="rBadges"></div>
    </div>

    <div class="sections">

      <div class="section">
        <div class="section-label">Definition</div>
        <div class="definition" id="rDef"></div>
        <div class="definition-uk" id="rDefUk"></div>
      </div>

      <div class="section">
        <div class="section-label">Usage frequency & popularity</div>
        <div class="usage-meter">
          <div class="meter-bar"><div class="meter-fill" id="rMeter" style="width:0%"></div></div>
          <div class="meter-label" id="rFreqLabel"></div>
        </div>
        <div style="margin-top:10px; font-size:13px; color:var(--text-muted); line-height:1.6" id="rFreqNote"></div>
      </div>

      <div class="section">
        <div class="section-label">Topics & contexts</div>
        <div class="topics" id="rTopics"></div>
        <div style="margin-top:10px; font-size:13px; color:var(--text-muted); line-height:1.6" id="rContextNote"></div>
      </div>

      <div class="section">
        <div class="section-label">Example sentences</div>
        <div class="examples" id="rExamples"></div>
      </div>

      <div class="section">
        <div class="section-label">Synonyms by complexity</div>
        <div class="synonyms-grid" id="rSynonyms"></div>
      </div>

    </div>
  </div>

  <div class="practice-section" id="practiceSection">
    <div class="practice-header">
      <div class="practice-title">🎯 Speaking Practice</div>
      <div class="practice-counter" id="practiceCounter">Task 1 of 3</div>
    </div>
    <div class="practice-body">
      <div class="situation-box" id="situationBox"></div>
      <div class="prompt-text" id="promptText"></div>
      <div class="hint-text" id="hintText"></div>
      <textarea class="answer-input" id="answerInput" placeholder="Type your answer here..."></textarea>
      <div class="practice-actions">
        <button class="check-btn" onclick="checkAnswer()">Check my answer</button>
        <button class="next-btn" onclick="nextTask()">Next task →</button>
      </div>
      <div class="feedback-box" id="feedbackBox"></div>
    </div>
  </div>

</main>

<script>
let currentWord = '';
let wordData = null;
let practiceTasks = [];
let currentTask = 0;
let wordHistory = [];

const wordInput = document.getElementById('wordInput');
wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyzeWord(); });

async function analyzeWord() {
  const word = wordInput.value.trim();
  if (!word) return;

  currentWord = word;
  showLoader(true);
  hideResult();
  hidePractice();
  hideError();

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: `You are an English vocabulary analyst. Return ONLY valid JSON, no markdown, no preamble.`,
        messages: [{
          role: "user",
          content: `Analyze the English word: "${word}"

Return ONLY this JSON structure (no markdown, no backticks):
{
  "word": "${word}",
  "pos": "noun/verb/adjective/adverb/etc",
  "phonetic": "/fəˈnetɪk/",
  "definition_en": "clear English definition in 1-2 sentences",
  "definition_uk": "Ukrainian translation and explanation",
  "frequency_percent": 72,
  "frequency_label": "Very common / Common / Moderate / Rare / Very rare",
  "frequency_note": "1-2 sentences about how/where this word is used in daily speech",
  "cefr_level": "A2/B1/B2/C1/C2",
  "difficulty": "Easy / Medium / Advanced",
  "topics": ["topic1", "topic2", "topic3", "topic4"],
  "context_note": "1-2 sentences about what topics and situations this word appears in",
  "examples": [
    {"en": "example sentence 1 using the word naturally", "context": "situation where you'd say this"},
    {"en": "example sentence 2 using the word naturally", "context": "situation where you'd say this"},
    {"en": "example sentence 3 using the word naturally", "context": "situation where you'd say this"}
  ],
  "synonyms_simpler": [{"word": "simpler synonym", "note": "when to use it"}],
  "synonyms_similar": [{"word": "similar synonym", "note": "slight difference"}],
  "synonyms_harder": [{"word": "harder synonym", "note": "more formal/advanced context"}],
  "practice_tasks": [
    {
      "situation": "Brief situation description in English",
      "prompt": "Question or instruction for the learner to answer using '${word}'",
      "hint": "Hint: try using '${word}' when you describe... [short tip]",
      "model_answer": "A natural example answer using '${word}' correctly"
    },
    {
      "situation": "Different situation",
      "prompt": "Another practice question",
      "hint": "Another helpful hint",
      "model_answer": "Model answer"
    },
    {
      "situation": "Third situation",
      "prompt": "Third question",
      "hint": "Third hint",
      "model_answer": "Model answer"
    }
  ]
}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    wordData = JSON.parse(clean);

    renderResult(wordData);
    renderPractice(wordData);
    addToHistory(word);

  } catch (err) {
    showError('Could not analyze this word. Please try again.');
    console.error(err);
  }

  showLoader(false);
  btn.disabled = false;
}

function renderResult(d) {
  document.getElementById('rWord').textContent = d.word;
  document.getElementById('rPos').textContent = d.pos;
  document.getElementById('rPhonetic').textContent = d.phonetic;
  document.getElementById('rDef').textContent = d.definition_en;
  document.getElementById('rDefUk').textContent = d.definition_uk;

  // Badges
  const badgeEl = document.getElementById('rBadges');
  const freqClass = d.frequency_percent >= 70 ? 'badge-freq-high' : d.frequency_percent >= 40 ? 'badge-freq-mid' : 'badge-freq-low';
  badgeEl.innerHTML = `
    <span class="badge ${freqClass}">${d.frequency_label}</span>
    <span class="badge badge-level">${d.cefr_level}</span>
    <span class="badge badge-diff">${d.difficulty}</span>
  `;

  // Meter
  document.getElementById('rMeter').style.width = d.frequency_percent + '%';
  document.getElementById('rFreqLabel').textContent = `${d.frequency_percent}% usage score`;
  document.getElementById('rFreqNote').textContent = d.frequency_note;

  // Topics
  const topicsEl = document.getElementById('rTopics');
  topicsEl.innerHTML = d.topics.map(t => `<span class="topic-tag">${t}</span>`).join('');
  document.getElementById('rContextNote').textContent = d.context_note;

  // Examples
  const exEl = document.getElementById('rExamples');
  exEl.innerHTML = d.examples.map(ex => `
    <div class="example-item">
      <div class="example-en">"${ex.en}"</div>
      <div class="example-context">📍 ${ex.context}</div>
    </div>
  `).join('');

  // Synonyms
  const synEl = document.getElementById('rSynonyms');
  let synHtml = '';
  if (d.synonyms_simpler && d.synonyms_simpler.length) {
    synHtml += `<div class="syn-group"><div class="syn-group-label">↓ Simpler alternatives</div><div class="syn-tags">`;
    synHtml += d.synonyms_simpler.map(s => `<span class="syn-tag syn-simpler" title="${s.note}">${s.word}</span>`).join('');
    synHtml += `</div></div>`;
  }
  if (d.synonyms_similar && d.synonyms_similar.length) {
    synHtml += `<div class="syn-group"><div class="syn-group-label">↔ Similar level</div><div class="syn-tags">`;
    synHtml += d.synonyms_similar.map(s => `<span class="syn-tag syn-similar" title="${s.note}">${s.word}</span>`).join('');
    synHtml += `</div></div>`;
  }
  if (d.synonyms_harder && d.synonyms_harder.length) {
    synHtml += `<div class="syn-group"><div class="syn-group-label">↑ More advanced</div><div class="syn-tags">`;
    synHtml += d.synonyms_harder.map(s => `<span class="syn-tag syn-harder" title="${s.note}">${s.word}</span>`).join('');
    synHtml += `</div></div>`;
  }
  synEl.innerHTML = synHtml;

  document.getElementById('resultCard').classList.add('visible');
}

function renderPractice(d) {
  practiceTasks = d.practice_tasks || [];
  currentTask = 0;
  loadTask();
  document.getElementById('practiceSection').classList.add('visible');
}

function loadTask() {
  if (!practiceTasks.length) return;
  const task = practiceTasks[currentTask];
  document.getElementById('situationBox').innerHTML = `<strong>Situation:</strong> ${task.situation}`;
  document.getElementById('promptText').textContent = task.prompt;
  document.getElementById('hintText').textContent = task.hint;
  document.getElementById('answerInput').value = '';
  document.getElementById('practiceCounter').textContent = `Task ${currentTask + 1} of ${practiceTasks.length}`;
  hideFeedback();
}

async function checkAnswer() {
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) return;

  const task = practiceTasks[currentTask];
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box visible improve';
  fb.innerHTML = '<div class="fb-label">Checking...</div>';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: "You are an English speaking coach. Be encouraging and specific. Reply in Ukrainian. Return ONLY JSON.",
        messages: [{
          role: "user",
          content: `The learner is practicing the word "${currentWord}" (level B1-B2 passive, A2-B1 active speaking).
          
Task: "${task.prompt}"
Learner's answer: "${answer}"
Model answer for reference: "${task.model_answer}"

Return ONLY this JSON:
{
  "used_word_correctly": true/false,
  "quality": "good" or "improve",
  "feedback_uk": "2-3 sentences feedback in Ukrainian. Be specific. If wrong/missing, show how to fix it. If good, point out what worked well.",
  "corrected_version": "improved version of their sentence if needed, or empty string"
}`
        }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);

    fb.className = `feedback-box visible ${result.quality}`;
    let html = `<div class="fb-label">${result.quality === 'good' ? '✓ Good work!' : '→ Almost there'}</div>`;
    html += `<div>${result.feedback_uk}</div>`;
    if (result.corrected_version) {
      html += `<div style="margin-top:8px; padding:8px 12px; background:rgba(255,255,255,0.05); border-radius:6px; font-style:italic; font-size:13px">"${result.corrected_version}"</div>`;
    }
    fb.innerHTML = html;

  } catch(e) {
    fb.className = 'feedback-box visible improve';
    fb.innerHTML = '<div class="fb-label">Error</div><div>Could not check. Try again.</div>';
  }
}

function nextTask() {
  currentTask = (currentTask + 1) % practiceTasks.length;
  loadTask();
}

function addToHistory(word) {
  if (!wordHistory.includes(word)) {
    wordHistory.unshift(word);
    if (wordHistory.length > 8) wordHistory.pop();
  }
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyRow');
  el.innerHTML = wordHistory.map(w =>
    `<span class="history-chip" onclick="loadWordFromHistory('${w}')">${w}</span>`
  ).join('');
}

function loadWordFromHistory(word) {
  wordInput.value = word;
  analyzeWord();
}

function showLoader(show) { document.getElementById('loader').classList.toggle('visible', show); }
function hideResult() { document.getElementById('resultCard').classList.remove('visible'); }
function hidePractice() { document.getElementById('practiceSection').classList.remove('visible'); }
function hideFeedback() { document.getElementById('feedbackBox').className = 'feedback-box'; }
function hideError() { document.getElementById('errorBox').classList.remove('visible'); }
function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('visible');
}
</script>
</body>
</html>
